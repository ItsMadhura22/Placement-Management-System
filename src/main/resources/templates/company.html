<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
 th:replace="~{layout}">

<section th:fragment="content">
    

<h2>Companies List</h2>
<hr>

<form th:action="@{/companies}" th:object="${company}" method="post" class="mb-4">

    <input type="hidden" th:field="*{id}"/>

    <div class="row">
        <div class="col-md-4">
            <input type="text" th:field="*{name}" class="form-control" placeholder="Company Name" required>
        </div>

        <div class="col-md-4">
            <input type="text" th:field="*{location}" class="form-control" placeholder="Location" required>
        </div>

        <div class="col-md-4">
            <input type="text" th:field="*{packageAmount}" class="form-control" placeholder="Package" required>
        </div>
    </div>

    <button type="submit" class="btn btn-primary mt-3">Save Company</button>
</form>

<table class="table table-bordered">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Location</th>
        <th>Package</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="company : ${companies}">
        <td th:text="${company.id}"></td>
        <td th:text="${company.name}"></td>
        <td th:text="${company.location}"></td>
        <td th:text="${company.packageAmount}"></td>

        <td>
            <a th:href="@{/companies/edit/{id}(id=${company.id})}"
               class="btn btn-warning btn-sm">Edit</a>

            <a th:href="@{/companies/delete/{id}(id=${company.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Are you sure?')">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

</section>
</html>
