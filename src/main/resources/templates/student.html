<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
 th:replace="~{layout}">
    
<section th:fragment="content">

<h2>Students List</h2>
<hr>

<form th:action="@{/students/search}" method="get" class="mb-3">

<div class="input-group">

<input type="text" name="keyword" class="form-control"
placeholder="Search student by name">

<button class="btn btn-primary">Search</button>

<a href="/students" class="btn btn-secondary">Reset</a>

</div>

</form>

<form th:action="@{/students}" th:object="${student}" method="post" class="mb-4">

    <input type="hidden" th:field="*{id}"/>

    <div class="row">
        <div class="col-md-3">
            <input type="text" th:field="*{name}" class="form-control" placeholder="Name" required>
        </div>

        <div class="col-md-3">
            <input type="email" th:field="*{email}" class="form-control" placeholder="Email" required>
        </div>

        <div class="col-md-3">
            <input type="text" th:field="*{course}" class="form-control" placeholder="Course" required>
        </div>

        <div class="col-md-3">
            <select th:field="*{company}" class="form-control">
                <option value="">Select Company</option>
                <option th:each="company : ${companies}"
                        th:value="${company.id}"
                        th:text="${company.name}">
                </option>
            </select>
        </div>
    </div>

    <button type="submit" class="btn btn-primary mt-3">Save Student</button>
</form>

<table class="table table-bordered">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Course</th>
        <th>Company</th>
        <th>Status</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="student : ${students}">
        <td th:text="${student.id}"></td>
        <td th:text="${student.name}"></td>
        <td th:text="${student.email}"></td>
        <td th:text="${student.course}"></td>
        <td th:text="${student.company != null ? student.company.name : 'Not Assigned'}"></td>

        <td>

            <span th:if="${student.company != null}"
            class="badge bg-success">

            Placed

            </span>

            <span th:if="${student.company == null}"
            class="badge bg-danger">

            Not Placed

        </span>

    </td>
    </tr>
    </tbody>
</table>

</section>
</html>
