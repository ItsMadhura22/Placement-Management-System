<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Placement Admin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow-x: hidden;
        }

        .wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 240px;
            background-color: #1e293b;
            color: white;
            position: fixed;
            height: 100vh;
        }

        .sidebar h3 {
            padding: 20px;
            border-bottom: 1px solid #334155;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: #cbd5e1;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #334155;
            color: white;
        }

        .content {
            margin-left: 240px;
            padding: 30px;
            width: 100%;
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Admin Panel</h3>
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/students}">Students</a>
        <a th:href="@{/companies}">Companies</a>
        
    <hr style="border-color:#475569">

    <a th:href="@{/logout}">Logout</a>

    </div>

    <!-- Main Content -->
    <div class="content">
    <div th:replace="~{::content}"></div>
</div>

</div>

</body>
</html>
